apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: globaldatabases.platform.comcast.com
spec:
  group: platform.comcast.com
  scope: Namespaced
  names:
    plural: globaldatabases
    singular: globaldatabase
    kind: GlobalDatabase
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              size:
                type: string
          status:
            type: object
            properties:
              port:
                type: integer
              hostname: 
                type: string
    additionalPrinterColumns:
    - jsonPath: .spec.size
      name: Size
      type: string
    - jsonPath: .status.hostname
      name: Hostname
      type: string